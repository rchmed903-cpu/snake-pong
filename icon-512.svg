  <!-- head white -->
  <rect x="210" y="258" width="28" height="28" rx="4" fill="#ffffff"/>
  <circle cx="220" cy="267" r="3.5" fill="#0a0a0a"/>
  <circle cx="232" cy="267" r="3.5" fill="#0a0a0a"/>
  <circle cx="221" cy="268" r="1" fill="#fff"/>
  <circle cx="233" cy="268" r="1" fill="#fff"/>

  <!-- food -->
  <rect x="370" y="354" width="28" height="28" rx="4" fill="#ff6b35"/>
  <rect x="366" y="350" width="36" height="36" rx="7" fill="none" stroke="#ff6b3544" stroke-width="3"/>

  <!-- title -->
  <text x="256" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#39ff14" letter-spacing="5">SNAKE</text>
  <text x="256" y="472" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="8">PONG</text>
</svg>
