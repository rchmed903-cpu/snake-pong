    <line x1="50" y1="146" x2="462" y2="146"/><line x1="50" y1="178" x2="462" y2="178"/>
    <line x1="50" y1="210" x2="462" y2="210"/><line x1="50" y1="242" x2="462" y2="242"/>
    <line x1="50" y1="274" x2="462" y2="274"/><line x1="50" y1="306" x2="462" y2="306"/>
    <line x1="50" y1="338" x2="462" y2="338"/><line x1="50" y1="370" x2="462" y2="370"/>
    <line x1="50" y1="402" x2="462" y2="402"/><line x1="50" y1="434" x2="462" y2="434"/>
    <line x1="82" y1="50" x2="82" y2="462"/><line x1="114" y1="50" x2="114" y2="462"/>
