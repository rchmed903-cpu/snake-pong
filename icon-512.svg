    <line x1="402" y1="50" x2="402" y2="462"/><line x1="434" y1="50" x2="434" y2="462"/>
  </g>

  <!-- snake row 1 right -->
  <rect x="82" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <rect x="114" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <rect x="146" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <rect x="178" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <rect x="210" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <rect x="242" y="130" width="28" height="28" rx="4" fill="#39ff14"/>
  <!-- turn down -->
  <rect x="242" y="162" width="28" height="28" rx="4" fill="#33e812"/>
  <rect x="242" y="194" width="28" height="28" rx="4" fill="#2ed410"/>
  <!-- row 2 left -->
  <rect x="210" y="194" width="28" height="28" rx="4" fill="#29c00e"/>
  <rect x="178" y="194" width="28" height="28" rx="4" fill="#24ac0c"/>
  <rect x="146" y="194" width="28" height="28" rx="4" fill="#1f980a"/>
  <rect x="114" y="194" width="28" height="28" rx="4" fill="#1a8408"/>
  <rect x="82" y="194" width="28" height="28" rx="4" fill="#157006"/>
  <!-- turn down -->
  <rect x="82" y="226" width="28" height="28" rx="4" fill="#125c05"/>
  <rect x="82" y="258" width="28" height="28" rx="4" fill="#0f4804"/>
  <!-- row 3 right -->
  <rect x="114" y="258" width="28" height="28" rx="4" fill="#0d3e03"/>
  <rect x="146" y="258" width="28" height="28" rx="4" fill="#0b3403"/>
