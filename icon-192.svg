<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="34" fill="#0d0d0d"/>
  <rect width="192" height="192" rx="34" fill="none" stroke="#39ff14" stroke-width="3"/>
  <rect x="11" y="11" width="170" height="170" rx="26" fill="#111"/>
  <rect x="19" y="19" width="154" height="154" rx="18" fill="#0a0a0a"/>

  <g stroke="#39ff1415" stroke-width="0.5">
    <line x1="19" y1="31" x2="173" y2="31"/><line x1="19" y1="43" x2="173" y2="43"/>
    <line x1="19" y1="55" x2="173" y2="55"/><line x1="19" y1="67" x2="173" y2="67"/>
    <line x1="19" y1="79" x2="173" y2="79"/><line x1="19" y1="91" x2="173" y2="91"/>
    <line x1="19" y1="103" x2="173" y2="103"/><line x1="19" y1="115" x2="173" y2="115"/>
    <line x1="19" y1="127" x2="173" y2="127"/><line x1="19" y1="139" x2="173" y2="139"/>
    <line x1="19" y1="151" x2="173" y2="151"/><line x1="19" y1="163" x2="173" y2="163"/>
    <line x1="31" y1="19" x2="31" y2="173"/><line x1="43" y1="19" x2="43" y2="173"/>
    <line x1="55" y1="19" x2="55" y2="173"/><line x1="67" y1="19" x2="67" y2="173"/>
    <line x1="79" y1="19" x2="79" y2="173"/><line x1="91" y1="19" x2="91" y2="173"/>
    <line x1="103" y1="19" x2="103" y2="173"/><line x1="115" y1="19" x2="115" y2="173"/>
    <line x1="127" y1="19" x2="127" y2="173"/><line x1="139" y1="19" x2="139" y2="173"/>
    <line x1="151" y1="19" x2="151" y2="173"/><line x1="163" y1="19" x2="163" y2="173"/>
  </g>

  <!-- snake row 1 right -->
  <rect x="31" y="43" width="10" height="10" rx="2" fill="#39ff14"/>
  <rect x="43" y="43" width="10" height="10" rx="2" fill="#39ff14"/>
  <rect x="55" y="43" width="10" height="10" rx="2" fill="#39ff14"/>
  <rect x="67" y="43" width="10" height="10" rx="2" fill="#39ff14"/>
  <rect x="79" y="43" width="10" height="10" rx="2" fill="#39ff14"/>
  <!-- turn down -->
  <rect x="79" y="55" width="10" height="10" rx="2" fill="#33e812"/>
  <rect x="79" y="67" width="10" height="10" rx="2" fill="#2dd410"/>
  <!-- row 2 left -->
  <rect x="67" y="67" width="10" height="10" rx="2" fill="#27c00e"/>
  <rect x="55" y="67" width="10" height="10" rx="2" fill="#21ac0c"/>
  <rect x="43" y="67" width="10" height="10" rx="2" fill="#1b980a"/>
  <rect x="31" y="67" width="10" height="10" rx="2" fill="#158406"/>
  <!-- turn down -->
  <rect x="31" y="79" width="10" height="10" rx="2" fill="#117004"/>
  <rect x="31" y="91" width="10" height="10" rx="2" fill="#0d5c03"/>
  <!-- row 3 right -->
  <rect x="43" y="91" width="10" height="10" rx="2" fill="#0b4e02"/>
  <rect x="55" y="91" width="10" height="10" rx="2" fill="#093e02"/>
  <!-- head white -->
  <rect x="67" y="91" width="10" height="10" rx="2" fill="#ffffff"/>
  <circle cx="70" cy="95" r="1.5" fill="#0a0a0a"/>
  <circle cx="75" cy="95" r="1.5" fill="#0a0a0a"/>

  <!-- food -->
  <rect x="139" y="127" width="10" height="10" rx="2" fill="#ff6b35"/>
  <rect x="137" y="125" width="14" height="14" rx="3" fill="none" stroke="#ff6b3555" stroke-width="1.5"/>

  <!-- title -->
  <text x="96" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#39ff14" letter-spacing="2">SNAKE</text>
  <text x="96" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="3">PONG</text>
</svg>
